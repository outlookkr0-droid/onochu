<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나뒹굴기 오노추</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Pretendard',sans-serif;
}

body{
min-height:100vh;
background:
linear-gradient(rgba(6,14,30,0.82),rgba(6,14,30,0.92)),
url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1920&auto=format&fit=crop');
background-size:cover;
background-position:center;
color:#eaf2ff;
padding:40px 20px;
}

.container{
max-width:900px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:35px;
}

.header h1{
font-size:42px;
margin-bottom:10px;
}

.glass{
background:rgba(17,29,53,0.55);
border:1px solid rgba(175,205,255,0.18);
border-radius:22px;
backdrop-filter:blur(12px);
box-shadow:0 8px 30px rgba(0,0,0,0.35);
padding:28px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.input-group{
display:flex;
flex-direction:column;
gap:8px;
}

.full{
grid-column:1 / -1;
}

input,textarea{
background:rgba(255,255,255,0.08);
border:none;
border-radius:14px;
padding:14px;
color:white;
outline:none;
}

input::placeholder,
textarea::placeholder{
color:rgba(255,255,255,0.5);
}

textarea{
min-height:120px;
resize:vertical;
}

.submit-btn{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#7ba7ff,#a0d0ff);
font-weight:700;
cursor:pointer;
}

.board{
display:flex;
flex-direction:column;
gap:18px;
margin-top:30px;
}

.card{
padding:24px;
position:relative;
overflow:hidden;
}

.song-title{
font-size:24px;
font-weight:700;
margin-bottom:6px;
}

.artist{
color:#b7cbff;
margin-bottom:16px;
}

.reason{
line-height:1.7;
margin-bottom:18px;
white-space:pre-wrap;
}

.meta{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.writer{
font-size:14px;
color:#9eb7ea;
}

.link-btn,.delete-btn{
border:none;
border-radius:12px;
padding:10px 14px;
cursor:pointer;
}

.link-btn{
background:rgba(131,177,255,0.18);
color:#dbe9ff;
}

.delete-btn{
background:rgba(255,108,108,0.16);
color:#ffd8d8;
}

.action-buttons{
display:flex;
gap:10px;
}

.empty{
text-align:center;
opacity:0.7;
padding:50px 20px;
}

@media(max-width:700px){
.form-grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>나뒹굴기 오노추</h1>
<p>당신의 밤을 스쳐 지나간 노래를 남겨 주세요.</p>
</div>

<div class="glass">

<div class="form-grid">

<div class="input-group">
<label>이름</label>
<input type="text" id="nickname" placeholder="익명">
</div>

<div class="input-group">
<label>비밀번호</label>
<input type="password" id="password" placeholder="삭제 시 필요합니다">
</div>

<div class="input-group full">
<label>노래 제목</label>
<input type="text" id="title" placeholder="예시: 당신은 히어로">
</div>

<div class="input-group full">
<label>가수</label>
<input type="text" id="artist" placeholder="가수 이름">
</div>

<div class="input-group full">
<label>유튜브 링크</label>
<input type="text" id="youtube" placeholder="https://youtube.com/...">
</div>

<div class="input-group full">
<label>추천 이유</label>
<textarea id="reason" placeholder="이 노래를 추천하는 이유를 적어 주세요..."></textarea>
</div>

</div>

<button class="submit-btn" onclick="addPost()">추천 남기기</button>

</div>

<div class="board" id="board">
<div class="glass empty">
아직 등록된 추천곡이 없습니다.
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA36mRKdkBWdHGEkxqzHJN_uh133AIK8-M",
authDomain: "hello-beb90.firebaseapp.com",
projectId: "hello-beb90",
storageBucket: "hello-beb90.firebasestorage.app",
messagingSenderId: "570689813435",
appId: "1:570689813435:web:4dc4d8e3c4aff5bfac629e",
measurementId: "G-D73R44KBK8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const board = document.getElementById("board");

loadPosts();

window.addPost = addPost;

async function addPost(){

const nickname = document.getElementById("nickname").value || "익명";
const password = document.getElementById("password").value;
const title = document.getElementById("title").value;
const artist = document.getElementById("artist").value;
const youtube = document.getElementById("youtube").value;
const reason = document.getElementById("reason").value;

if(!password || !title || !artist || !reason){
alert("비밀번호와 노래 정보를 입력해 주세요.");
return;
}

await addDoc(collection(db,"posts"),{
nickname,
password,
title,
artist,
youtube,
reason,
createdAt:new Date().toLocaleString("ko-KR"),
timestamp:Date.now()
});

document.getElementById("nickname").value = "";
document.getElementById("password").value = "";
document.getElementById("title").value = "";
document.getElementById("artist").value = "";
document.getElementById("youtube").value = "";
document.getElementById("reason").value = "";

loadPosts();
}

async function loadPosts(){

board.innerHTML = "";

const q = query(collection(db,"posts"),orderBy("timestamp","desc"));

const snapshot = await getDocs(q);

if(snapshot.empty){

board.innerHTML = `
<div class="glass empty">
아직 등록된 추천곡이 없습니다.
</div>
`;

return;
}

snapshot.forEach((item)=>{

const post = item.data();

const card = document.createElement("div");

card.className = "card glass";

card.innerHTML = `
<div class="song-title">${post.title}</div>

<div class="artist">by ${post.artist}</div>

<div class="reason">${post.reason}</div>

<div class="meta">

<div class="writer">
- ${post.nickname} · 작성 시간: ${post.createdAt}
</div>

<div class="action-buttons">

${post.youtube ? `<button class="link-btn" onclick="window.open('${post.youtube}')">노래 듣기</button>` : ""}

<button class="delete-btn" onclick="deletePost('${item.id}','${post.password}')">
삭제
</button>

</div>

</div>
`;

board.appendChild(card);

});

}

window.deletePost = deletePost;

async function deletePost(id,password){

const input = prompt("비밀번호를 입력해 주세요.");

if(input === password){

await deleteDoc(doc(db,"posts",id));

alert("삭제되었습니다.");

loadPosts();

}else{

alert("비밀번호가 일치하지 않습니다.");

}

}

</script>

</body>
</html>
